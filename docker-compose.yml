services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-service
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fishshop_network

  seq:
    image: datalust/seq:latest
    container_name: seq-service
    ports:
      - "5341:80"
    environment:
      ACCEPT_EULA: Y
      SEQ_FIRSTRUN_ADMINPASSWORD: admin123
    volumes:
      - seq_data:/data
    networks:
      - fishshop_network

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: jaeger-service
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - fishshop_network

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: prometheus-service
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --web.enable-lifecycle
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - fishshop_network

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana-service
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - fishshop_network

  api.user:
    build:
      context: ./API
      dockerfile: Services/API.User/Dockerfile
    container_name: api-user
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Seq__ServerUrl=http://seq:80
      - RabbitMQ__Host=rabbitmq
      - Otlp__Endpoint=http://jaeger:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./API/assets/user:/app/assets/user
    depends_on:
      - rabbitmq
      - seq
      - jaeger
    networks:
      - fishshop_network

  api.product:
    build:
      context: ./API
      dockerfile: Services/API.Product/Dockerfile
    container_name: api-product
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Seq__ServerUrl=http://seq:80
      - RabbitMQ__Host=rabbitmq
      - Otlp__Endpoint=http://jaeger:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./API/assets/product:/app/assets/product
    depends_on:
      - rabbitmq
      - seq
      - jaeger
    networks:
      - fishshop_network

  api.order:
    build:
      context: ./API
      dockerfile: Services/API.Order/Dockerfile
    container_name: api-order
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Seq__ServerUrl=http://seq:80
      - RabbitMQ__Host=rabbitmq
      - ProductServiceUrl=http://api-product:8080
      - UserServiceUrl=http://api-user:8080
      - Otlp__Endpoint=http://jaeger:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - rabbitmq
      - seq
      - jaeger
    networks:
      - fishshop_network

  api.content:
    build:
      context: ./API
      dockerfile: Services/API.Content/Dockerfile
    container_name: api-content
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Seq__ServerUrl=http://seq:80
      - RabbitMQ__Host=rabbitmq
      - Otlp__Endpoint=http://jaeger:4317
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./API/assets/content:/app/assets/content
    depends_on:
      - rabbitmq
      - seq
      - jaeger
    networks:
      - fishshop_network

  fishshop.gateway:
    build:
      context: ./API
      dockerfile: Gateway/FishShop.Gateway/Dockerfile
    container_name: fishshop-gateway
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Seq__ServerUrl=http://seq:80
      - Otlp__Endpoint=http://jaeger:4317
      - ReverseProxy__Clusters__user-cluster__Destinations__primary__Address=http://api-user:8080/
      - ReverseProxy__Clusters__product-cluster__Destinations__primary__Address=http://api-product:8080/
      - ReverseProxy__Clusters__order-cluster__Destinations__primary__Address=http://api-order:8080/
      - ReverseProxy__Clusters__content-cluster__Destinations__primary__Address=http://api-content:8080/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api.user
      - api.product
      - api.order
      - api.content
      - seq
      - jaeger
    networks:
      - fishshop_network

networks:
  fishshop_network:
    driver: bridge

volumes:
  rabbitmq_data:
  seq_data:
  prometheus_data:
  grafana_data:
